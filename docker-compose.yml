services:
  api:
    build: .
    ports:
      - "${HOST_PORT}:${PORT}"
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:7
    ports:
      - "${HOST_DB_PORT}:${DB_PORT}"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
